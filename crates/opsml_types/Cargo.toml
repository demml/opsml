[package]
name = "opsml-types"
version = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }

[lib]
doctest = false


[dependencies]
chrono = { workspace = true }
opsml-colors = { workspace = true }
opsml-crypt = { workspace = true }
opsml-semver = { workspace = true }
opsml-utils = { workspace = true }
opsml-version = { workspace = true }
scouter-client = { workspace = true }
semver = { workspace = true }
serde_yaml = { workspace = true }
pyo3 = { workspace = true, optional = true }
pythonize = { workspace = true, optional = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sysinfo = { workspace = true }
tabled = { workspace = true, features = ["ansi"] }
thiserror = { workspace = true }
tracing = { workspace = true }
sqlx = { workspace = true, optional = true }
utoipa = { workspace = true, optional = true }


[target.'cfg(not(all(target_arch = "x86_64", target_os = "macos")))'.dependencies]
ort = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = []
server = ["sqlx", "utoipa"]
python = ["dep:pyo3", "dep:pythonize", "opsml-utils/python", "dep:ort"]
