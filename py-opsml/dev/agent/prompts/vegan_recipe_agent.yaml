space: opsml
name: vegan-recipe-agent
prompt:
  model: gemini-3-flash-preview
  provider: Gemini
  messages:
    - |
      You are the vegan_agent. Your job is to generate strictly plant-based (vegan) recipes in valid JSON format.
      You provide creative suggestions using vegetables, legumes, grains, nuts, and plant-based meat alternatives.

      When you receive a user query, analyze it to determine preferences.
      If the user query specifically requests meat, dairy, eggs, or honey, return a JSON object containing the error message "Sorry, I can only generate vegan, plant-based recipes."

      ### OUTPUT INSTRUCTIONS:
      Return ONLY a valid JSON object. Do not include markdown formatting like ```json or any conversational text. The output must be directly parsable by a pydantic JSON decoder.

      ### SCHEMA:
      {
        "name": "string",
        "ingredients": [
          {"name": "string", "quantity": "string", "unit": "string"}
        ],
        "directions": ["string"],
        "prep_time_minutes": integer,
        "servings": integer,
        "rating": {"score": integer, "reason": "string"} | null
      }

      ### GUIDELINES:
      - Recipe must contain NO animal products (no meat, dairy, eggs, or honey).
      - Recipe should be easy to follow and practical for home cooks.
      - Provide specific quantities and units for each ingredient.
      - Include detailed, step-by-step cooking directions.
      - Specify prep time (must be less than 120 minutes) and number of servings.
  response_format:
    title: Recipe
    properties:
      name:
        type: string
      ingredients:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            quantity:
              type: string
            unit:
              type: string
          required: [name, quantity, unit]
      directions:
        type: array
        items:
          type: string
      prep_time_minutes:
        type: integer
      servings:
        type: integer
      rating:
        type:
          - object
          - "null"
        properties:
          score:
            type: integer
          reason:
            type: string
        required: [score, reason]
    required:
      - name
      - ingredients
      - directions
      - prep_time_minutes
      - servings
    additionalProperties: false
evaluation:
  alias: vegan_eval
  tasks:
    - task_type: Assertion
      id: validate_ingredients
      context_path: recipe.ingredients
      operator: HasLengthGreaterThan
      expected_value: 0
      description: "Verifies recipe contains at least one ingredient"
      depends_on: []
      condition: false

    - task_type: Assertion
      id: validate_directions
      context_path: recipe.directions
      operator: HasLengthGreaterThan
      expected_value: 0
      description: "Verifies recipe contains at least one direction step"
      depends_on: []
      condition: false

    - task_type: Assertion
      id: validate_prep_time
      context_path: recipe.prep_time_minutes
      operator: LessThan
      expected_value: 120
      description: "Verifies recipe prep time is less than 120 minutes"
      depends_on: []
      condition: false

    - task_type: TraceAssertion
      id: verify_eval_call
      operator: Equals
      expected_value: 1
      description: Ensure retries are within limit
      depends_on: []
      condition: false
      assertion:
        SpanCount:
          filter:
            ByName:
              name: vegan_recipe_evaluation
