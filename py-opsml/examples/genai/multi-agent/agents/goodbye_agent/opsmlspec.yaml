# Step 1: Define your agent here.
#
# This file is the single source of truth for your agent's identity, capabilities,
# and the prompt(s) it uses. AppState.from_spec() in lifespan.py reads this file
# to register the agent and prompt cards with the OpsML registry.
#
# To customize this template:
#   - Update the agent name, description, and skills below
#   - Edit prompts/goodbye_agent.yaml to change the model and system prompt
#   - Add more prompt cards under service.cards for multi-prompt agents
#
# See: https://docs.ml.us-central1.staging.shipt.com/opsml/
name: "goodbye-agent"
# space is the name you want to use for your agent's space in the OpsML
# registry. It can be any string, but it's common to use your repo or team name
# here.
space: opsml
type: Agent

metadata:
  description: "A goodbye world agent template service"
  language: "python"
  tags: ["goodbye", "farewell", "example", "template"]

service:
  cards:
    - alias: goodbye_agent
      path: "prompts/goodbye_agent.yaml"
      registry_type: prompt

  agent:
    version: "1.0.0"
    capabilities:
      streaming: false
      push_notifications: false
      extended_agent_card: false
    default_output_modes: ["text/plain"]
    default_input_modes: ["text/plain"]
    description: "A goodbye agent that bids farewell to users."
    name: "Goodbye Agent"
    skills:
      - format: a2a
        id: "farewell"
        name: "Farewell Skill"
        description: "Bids farewell to the user."
        input_modes: ["text/plain"]
        output_modes: ["text/plain"]
        tags: ["goodbye", "farewell", "example"]
        examples:
          - "Say goodbye to Alice"
          - "Farewell!"

    supported_interfaces:
      - protocol_binding: "JSONRPC"
        url: "http://localhost:8002"
