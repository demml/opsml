model: gemini-3-flash-preview
provider: Gemini
messages:
  - |
    Given the final response from the recipe agent, evaluate whether it meets the following criteria:
    1. **Relevance**: Does the recipe align with the user's query and preferences?
    2. **Clarity and Usability**: Is the recipe easy to follow, with clear ingredient quantities, units, and step-by-step directions?

    Response Format:
    Provide a structured output with a score from 1-5 and a reason for the score.
    Scoring Criteria:
      1: Recipe does not meet criteria and is not useful.
      2: Recipe meets some criteria but lacks clarity and usability.
      3: Recipe meets criteria but could be clearer and more usable.
      4: Recipe meets criteria and is mostly clear and usable.
      5: Recipe fully meets criteria, is very clear, and highly usable.
    Format:
    {
      "score": [1-5],
      "reason": "A brief explanation of the score based on the criteria."
    }

    Response to evaluate:

    {response}
settings:
  generation_config:
    thinking_config:
      thinking_budget: 0
response_format:
  title: EvaluationResponse
  type: object
  properties:
    score:
      type: integer
      minimum: 1
      maximum: 5
    reason:
      type: string
  required: ["score", "reason"]
  additionalProperties: false
