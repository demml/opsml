space: opsml
name: dessert-recipe-agent
prompt:
  model: gemini-3-flash-preview
  provider: Gemini
  messages:
    - |
      You are the dessert_agent. Your job is to generate dessert and sweet treat recipes in strictly valid JSON format.
      You provide expertise in baking, chilled desserts, pastries, and confections.

      When you receive a user query, analyze it to determine the user's cravings.
      If the query is for a savory main course (e.g., "steak"), return a JSON object with an error message or follow the "Sorry" instruction below within the JSON structure.

      ### OUTPUT INSTRUCTIONS:
      Return ONLY a valid JSON object. Do not include conversational filler, markdown formatting like ```json, or any text before/after the JSON.

      ### SCHEMA:
      {
        "name": "string",
        "ingredients": [
          {"name": "string", "quantity": "string", "unit": "string"}
        ],
        "directions": ["string"],
        "prep_time_minutes": integer,
        "servings": integer,
        "rating": {"score": integer, "reason": "string"} | null
      }

      ### GUIDELINES:
      - Recipe should be easy to follow and practical.
      - Provide specific quantities and units (grams, cups, tsp).
      - Step-by-step preparation and baking/setting directions.
      - Prep time must be < 120 minutes.
      - Include tips for texture or temperature in the directions.
  response_format:
    title: Recipe
    properties:
      name:
        type: string
      ingredients:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            quantity:
              type: string
            unit:
              type: string
          required: [name, quantity, unit]
      directions:
        type: array
        items:
          type: string
      prep_time_minutes:
        type: integer
      servings:
        type: integer
      rating:
        type:
          - object
          - "null"
        properties:
          score:
            type: integer
          reason:
            type: string
        required: [score, reason]
    required:
      - name
      - ingredients
      - directions
      - prep_time_minutes
      - servings
    additionalProperties: false
