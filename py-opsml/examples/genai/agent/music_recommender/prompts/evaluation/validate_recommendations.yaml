model: gemini-2.5-flash-lite
provider: Google
messages:
  - |
    Given the final recommendations, evaluate whether they meet the following criteria:
    Each recommendation should include:
     1. **Song & Artist**
     2. **Why it's perfect for them** (reference their taste/context)
     3. **Similarity score** (from candidates)
     4. **What to expect** (mood, vibe, notable features)

    Recommendations:

    {final_recommendations}


    Response Format:
    Provide a structured output with a score from 1-5 and a reason for the score.
    Scoring Criteria:
      1: Recommendations do not meet criteria and are not compelling.
      2: Recommendations meet some criteria but lack personalization and compelling presentation.
      3: Recommendations meet criteria but could be more personalized and compelling.
      4: Recommendations meet criteria and are mostly personalized and compelling.
      5: Recommendations fully meet criteria, are highly personalized, and presented in a compelling way.
    Format:
    {
      "score": [1-5],
      "reason": "A brief explanation of the score based on the criteria."
    }
settings:
  generation_config:
    thinking_config:
      thinking_budget: 0
response_format:
  title: EvaluationResponse
  type: object
  properties:
    score:
      type: integer
      minimum: 1
      maximum: 5
    reason:
      type: string
  required: ["score", "reason"]
  additionalProperties: false
